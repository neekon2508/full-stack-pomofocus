spring:
  flyway:
    url: jdbc:mysql://localhost:3306/my_db
    schemas: my_db
    user: root
    password: secret
    locations:
      - classpath:db/mysql/ddl
      - classpath:db/mysql/data
    baseline-one-migrate: true
    baselineVersion: 0.0
    out-of-order: true

  datasource:
    primary:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://localhost:3306/my_db?allowPublicKeyRetrieval=true&useSSL=false
      username: root
      password: secret
    secondary:
      driver-class-name:
      jdbc-url:
      username:
      password:
  autoconfigure:
    exclude:
      - org.springframework.session.autoconfigure.SessionAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
jasypt:
  encryptor:
    password: Ami2025!

interceptor:
  authorization:
    exclude-paths: >-
      /api/test/**,
      /api/auth/**,
      /api/swagger-ui.html,
      /api/swagger-ui/**,
      /error,
      /api/v1/sso/**,
      /api/v3/api-docs/**,