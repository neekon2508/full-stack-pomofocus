spring:
  profiles:
    group:
      default: common, default
      dev: common, dev
      prd: common, prd
    active: default
---

spring:
  config:
    activate:
      on-profile: common
  
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html

springdoc:
  packages-to-scan: backend
  default-consumes-media-type: application/json;charset=UTF-8
  default-produces-media-type: application/json;charset=UTF-8
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    operations-sorter: alpha
    tags-sorter: alpha

server:
  port: 7070
  servlet:
    context-path: /
    encoding: 
      charset: UTF-8
      enabled: true
      force: true
    session:
      cookie:
        name: JSESSIONID
        domain: localhost
        path: /
        http-only: true
        secure: false

google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}

---
spring:
  config:
    activate:
      on-profile: default
    import:
      - classpath:config/default/config.yml

---
spring:
  config:
    activate:
      on-profile: dev
    import:
      - classpath:config/dev/config.yml

---
spring:
  config:
    activate:
      on-profile: prd
    import:
      - classpath:config/prd/config.yml
